spring.application.name=4-Arcade-backend

spring.config.import=optional:file:.env[.properties]

# postgresql db setting
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Supabase
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true

# JPA setting
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

#debug=true

# jwt
jwt.issuer=arcade-backend
jwt.audience=arcade-clients
jwt.access-ttl-minutes=20
jwt.clock-skew-seconds=30
jwt.secret-base64=${JWT_ACCESS_SECRET_BASE64}

# redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
spring.data.redis.repositories.enabled=false

# Cloudflare R2 (S3 API)
cloud.aws.s3.endpoint=${R2_ENDPOINT}
cloud.aws.s3.bucket=${R2_BUCKET}
cloud.aws.s3.access-key=${R2_ACCESS_KEY}
cloud.aws.s3.secret-key=${R2_SECRET_KEY}
# R2 Public Domain (public access)
cloud.aws.s3.public-domain=${R2_PUBLIC_DOMAIN}
# S3 Client
cloud.aws.region.static=auto
cloud.aws.region.auto=false
cloud.aws.stack.auto=false
# image size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

